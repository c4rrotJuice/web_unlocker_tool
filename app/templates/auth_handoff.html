<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Handoff</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      width: min(560px, 92vw);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.45);
    }

    .title {
      font-size: 1.1rem;
      margin: 0 0 0.55rem 0;
      color: #f8fafc;
    }

    .status {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.4;
      color: #cbd5e1;
    }

    .status.error {
      color: #fca5a5;
    }

    .status.success {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <main class="card" role="status" aria-live="polite">
    <h1 class="title">Sign-in complete</h1>
    <p id="status" class="status">Return to the extension. It will finish secure session exchange in the background.</p>
    <p class="status" style="margin-top: 0.75rem;">
      If the extension does not update within a few seconds, reopen the extension popup or sidepanel.
    </p>
    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
      <a href="/auth?source=extension" style="color: #93c5fd;">Retry sign-in</a>
      <button id="close-tab" type="button" style="background: #1d4ed8; color: #fff; border: 0; border-radius: 8px; padding: 0.45rem 0.7rem; cursor: pointer;">Close tab</button>
    </div>
  </main>

  <!--
    Compatibility seam only.
    The new extension must use backend auth handoff endpoints directly and must not
    depend on this page's injected bridge behavior as required architecture.
  -->
  <script>
    window.WRITIOR_SUPABASE_URL = {{ supabase_url | tojson }};
    window.WRITIOR_SUPABASE_ANON_KEY = {{ supabase_key | tojson }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/js/auth.js"></script>
  <script>
    const handoffCode = {{ code | tojson }};
    const attemptId = {{ attempt_id | tojson }};
    const statusEl = document.getElementById("status");
    const closeBtn = document.getElementById("close-tab");

    function setStatus(text, isError = false, isSuccess = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", Boolean(isError));
      statusEl.classList.toggle("success", Boolean(isSuccess));
    }
    if (closeBtn) {
      closeBtn.addEventListener("click", function onCloseClick() {
        window.close();
      });
    }

    async function applyWebSession(session) {
      if (!session || !session.access_token || !session.refresh_token) {
        throw new Error("handoff_session_missing");
      }
      const auth = window.webUnlockerAuth;
      if (!auth || typeof auth.setSession !== "function") {
        throw new Error("web_auth_client_missing");
      }
      const result = await auth.setSession({
        access_token: session.access_token,
        refresh_token: session.refresh_token,
      });
      if (result && result.error) {
        throw new Error((result.error && result.error.message) || "handoff_session_apply_failed");
      }
    }

    async function runCodeRestore() {
      setStatus("Restoring secure handoff…");
      try {
        if (!window.chrome || !window.chrome.runtime || typeof window.chrome.runtime.sendMessage !== "function") {
          setStatus("Extension bridge unavailable. Reopen the extension and retry sign-in.", true);
          return false;
        }
        // Legacy bridge path kept only for older web-tab handoff behavior.
        chrome.runtime.sendMessage(
          { type: "AUTH_RESTORE", payload: { code: handoffCode } },
          async function onRestoreResponse(response) {
            if (chrome.runtime.lastError) {
              setStatus("Extension bridge unavailable. Reopen the extension and retry sign-in.", true);
              return;
            }
            if (!response || !response.ok) {
              setStatus("Secure restore did not complete. Reopen the extension and retry.", true);
              return;
            }
            try {
              const payload = response.data || {};
              await applyWebSession(payload.web_session || payload.session);
              const redirectPath = payload.redirect_path || "/dashboard";
              setStatus("Session restored. Redirecting…");
              window.location.replace(redirectPath);
            } catch (_error) {
              setStatus("Session restore failed in this tab. Return to /auth and retry.", true);
            }
          }
        );
        return true;
      } catch (_error) {
        setStatus("Secure restore failed. Return to /auth and retry.", true);
        return false;
      }
    }

    function bootstrapHandoffPage() {
      if (attemptId) {
        setStatus("Sign-in complete. Finalizing extension access and closing this window…", false, true);
        window.setTimeout(() => {
          window.close();
        }, 160);
      } else if (handoffCode) {
        void runCodeRestore();
      } else {
        setStatus("Missing handoff details. Return to /auth and retry.", true);
      }
    }

    bootstrapHandoffPage();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writior Popup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="workspace-shell workspace-popup">
      <header class="workspace-header">
        <div>
          <p class="workspace-kicker">Writior Extension</p>
          <h1>Quick Launcher</h1>
        </div>
        <p id="status" class="workspace-status">Loading…</p>
      </header>

      <section id="status-card" class="workspace-content"></section>

      <section class="workspace-actions workspace-actions-stack">
        <button id="open-sign-in" type="button">Sign in</button>
        <button id="open-sidepanel" type="button">Open sidepanel</button>
        <button id="work-in-editor" type="button">Work in editor</button>
        <button id="sync-now" type="button">Retry sync</button>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>

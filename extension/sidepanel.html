<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writior Side Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="workspace-shell workspace-sidepanel">
      <header class="workspace-header">
        <div>
          <p class="workspace-kicker">Writior Extension</p>
          <h1>Research Workspace</h1>
        </div>
        <p id="status" class="workspace-status">Loading…</p>
      </header>

      <section class="workspace-toolbar">
        <div class="workspace-summary">
          <span id="auth-state">Signed out</span>
          <span id="sync-state">0 queued</span>
        </div>
        <div class="workspace-actions">
          <button id="open-sign-in" type="button">Sign in</button>
          <button id="open-editor" type="button">Work in editor</button>
          <button id="open-dashboard" type="button">Dashboard</button>
          <button id="sync-now" type="button">Retry sync</button>
        </div>
      </section>

      <nav class="workspace-tabs" aria-label="Sidepanel tabs">
        <button type="button" class="is-active" data-tab="capture" aria-selected="true">Capture</button>
        <button type="button" data-tab="notes" aria-selected="false">Notes</button>
        <button type="button" data-tab="citations" aria-selected="false">Citations</button>
        <button type="button" data-tab="activity" aria-selected="false">Activity</button>
      </nav>

      <section id="workspace" class="workspace-content" aria-live="polite"></section>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
